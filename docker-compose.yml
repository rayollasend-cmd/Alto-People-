services:
  postgres:
    image: postgres:16-alpine
    container_name: alto-people-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alto_dev}
      POSTGRES_DB: ${POSTGRES_DB:-alto_people}
    ports:
      - "5432:5432"
    volumes:
      - alto-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alto} -d ${POSTGRES_DB:-alto_people}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  alto-pg-data:
    name: alto-people-pg-data
