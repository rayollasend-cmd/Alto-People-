<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0B1832" />
    <meta name="description" content="Alto People — workforce management HR platform" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!-- Modern standards-track tag for non-Safari browsers. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Legacy Apple-prefixed tag — iOS Safari still only respects this one. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Alto" />
    <title>Alto People</title>
    <!-- Fonts are self-hosted via @fontsource-variable/* and bundled by Vite —
         see apps/web/src/main.tsx. No Google Fonts CDN hop. -->
    <!-- API requests go through Vite's /api proxy in dev and are same-origin
         in prod (Express serves the SPA + API from one host), so no
         preconnect is needed in either case. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
